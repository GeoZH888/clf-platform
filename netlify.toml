# ──────────────────────────────────────────────────────────────────────
#  大卫学中文 — Netlify config (v3 — Anthropic + DeepSeek + Voyage + Stability + RAG)
# ──────────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler          = "esbuild"
  included_files        = ["netlify/functions/**/*.json"]
  # IMPORTANT: every parser lib used by a function MUST be in external_node_modules,
  # otherwise esbuild tries to bundle them into the Lambda and breaks on native deps.
  external_node_modules = ["pdf-parse", "pdf2json", "adm-zip", "mammoth", "xlsx"]

# ─── Long-running functions (900s = 15 min, max for Pro background) ────
[functions."process-pdf"]
  timeout = 900

[functions."process-zip"]
  timeout = 900

[functions."classify-embed"]
  timeout = 900

[functions."rag-search"]
  timeout = 900

[functions."process-document"]
  timeout = 900

[functions."process-document-background"]
  timeout = 900

[functions."process-zip-corpus-background"]
  timeout = 900

[functions."batch-translate-mnemonics"]
  timeout = 900

# ─── Shorter functions ─────────────────────────────────────────────────
[functions."generate-illustration"]
  timeout = 60   # Stability Ultra can take 20-40s

[functions."azure-tts-speak"]
  timeout = 30

# ─── Routing ───────────────────────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Dev ───────────────────────────────────────────────────────────────
[dev]
  command    = "npm run dev"
  port       = 8888
  targetPort = 5173
  autoLaunch = false

